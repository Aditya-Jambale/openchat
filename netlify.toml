[build]
  command = "npm run build"
  publish = "dist"

[functions]
  node_bundler = "esbuild"

# Streaming chat endpoint — handled by the v2 function (chat.mjs) which
# returns a native ReadableStream Response so SSE tokens arrive in real-time.
# Must come before the generic /api/* redirect so it takes priority.
[[redirects]]
  from = "/api/chat"
  to = "/.netlify/functions/chat"
  status = 200
  force = true

# All other /api routes — handled by the Express app via serverless-http.
[[redirects]]
  from = "/api/*"
  to = "/.netlify/functions/api/:splat"
  status = 200
  force = true

# SPA fallback
[[redirects]]
  from = "/*"
  to = "/index.html"
  status = 200
